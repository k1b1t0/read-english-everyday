name: Daily Workout Reminder Bot

on:
  schedule:
    - cron: '0 22 * * *'   # 05:00 AM GMT+7 (22:00 UTC of previous day)
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  send-workout-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run daily workout bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || secrets.GEMINI_MODEL || 'gemini-2.0-flash' }}
          ZALO_BOT_TOKEN: ${{ secrets.ZALO_BOT_TOKEN }}
          ZALO_CHAT_ID: ${{ secrets.ZALO_CHAT_ID }}
        run: uv run python workout_bot/main.py
